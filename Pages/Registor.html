<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - GymRats LK</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="card">
    <h2>Join GymRats!</h2>
    <p>Create an account to start tracking.</p>

    <form id="registerForm">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="text" id="username" placeholder="Choose a Username" required>

        <div class="row">
            <input type="number" id="age" placeholder="Age" required min="10" max="100">
            <select id="gender" required>
                <option value="" disabled selected>Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <input type="text" id="gym_id" placeholder="Gym ID (e.g. 401)">
        <input type="password" id="password" placeholder="Create Password" required>

        <button type="submit">Register</button>
    </form>

    <p style="text-align: center; margin-top: 20px;">
        Already have an account? <a href="Login.html">Login</a>
    </p>
</div>

<script>
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const userData = {
            name: document.getElementById("name").value.trim(),
            username: document.getElementById("username").value.trim(),
            password: document.getElementById("password").value.trim(),
            age: document.getElementById("age").value.trim(),
            gender: document.getElementById("gender").value,
            gym_id: document.getElementById("gym_id").value.trim()
        };

        try {
            const response = await fetch('http://localhost:4000/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });

            // Handle 409 Conflict (User or Gym ID already exists)
            if (response.status === 409) {
                const errorDetails = await response.json();
                alert(`Registration Failed: ${errorDetails.error || "Username or Gym ID already exists."}`);
                return;
            }

            if (!response.ok) {
                const errorData = await response.json();
                alert(errorData.error || "Registration failed");
                return;
            }

            alert("Registration successful! Please login.");
            window.location.href = "Login.html";
        } catch (err) {
            console.error(err);
            alert("Server error. Please ensure your backend is running on localhost:4000.");
        }
    });
</script>
</body>
</html>
