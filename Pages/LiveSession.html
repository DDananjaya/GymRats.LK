<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Workout Session</title>
  <link rel="stylesheet" href="live-session.css" />
</head>
<body>
  <div class="container">
    <header class="page-header">
      <div>
        <h2>Live Workout</h2>
        <p>Move through your plan, mark each exercise done, and stay on track.</p>
      </div>
      <div class="session-controls">
        <button class="btn-secondary" id="restart-btn">Restart Session</button>
        <button class="btn-primary" id="start-btn">Start Session</button>
      </div>
    </header>

    <section class="session-card">
      <div class="progress-wrap">
        <div class="progress-label">
          <span id="current-ex-label">Current: —</span>
          <span id="progress-text">0 / 0 done</span>
        </div>
        <div class="progress-bar">
          <div id="progress-fill"></div>
        </div>
      </div>

      <div id="exercise-list" class="exercise-list"></div>

      <div class="live-actions">
        <button class="btn-primary" id="mark-done-btn" disabled>Mark Current as Done → Next</button>
      </div>
    </section>
  </div>

  <script>
    const token = localStorage.getItem("token");

    const listEl = document.getElementById("exercise-list");
    const currentLabel = document.getElementById("current-ex-label");
    const progressText = document.getElementById("progress-text");
    const progressFill = document.getElementById("progress-fill");
    const markDoneBtn = document.getElementById("mark-done-btn");
    const startBtn = document.getElementById("start-btn");
    const restartBtn = document.getElementById("restart-btn");

    const sampleExercises = [
      { name: "Squats", sets: "4", reps: "10", type: "Normal" },
      { name: "Leg Press", sets: "3", reps: "12", type: "Drop Set" },
      { name: "Walking Lunges", sets: "3", reps: "12/leg", type: "Normal" },
      { name: "Calf Raises", sets: "4", reps: "15", type: "Super Set" }
    ];

    let exercises = [];
    let currentIndex = -1;

    function renderList() {
      listEl.innerHTML = "";

      exercises.forEach((ex, idx) => {
        const row = document.createElement("div");
        row.className = "exercise-row";

        const setsReps = [ex.sets, ex.reps].filter(Boolean).join(" x ");
        const meta = [setsReps, ex.type ? `• ${ex.type}` : ""].filter(Boolean).join(" ");

        row.innerHTML = `
          <div class="left">
            <div class="title">${ex.day ? ex.day + " - " : ""}${ex.name || "Exercise"}</div>
            <div class="meta">${meta}</div>
          </div>
          <div class="right">
            <span class="status ${ex.done ? "done" : ""}">${ex.done ? "Done" : "Pending"}</span>
          </div>
        `;

        if (idx === currentIndex) row.classList.add("current");
        if (ex.done) row.classList.add("completed");
        listEl.appendChild(row);
      });
    }

    function updateUI() {
      const total = exercises.length;
      const doneCount = exercises.filter((e) => e.done).length;

      progressText.textContent = `${doneCount} / ${total} done`;
      progressFill.style.width = total ? `${(doneCount / total) * 100}%` : "0%";

      if (currentIndex >= 0 && currentIndex < total) {
        currentLabel.textContent = `Current: ${exercises[currentIndex].name || "Exercise"}`;
        markDoneBtn.disabled = false;
      } else {
        currentLabel.textContent = "Current: —";
        markDoneBtn.disabled = true;
      }

      renderList();
    }

    async function loadLiveData() {
      try {
        if (!token) {
          exercises = sampleExercises.map((ex) => ({ ...ex, done: false }));
          currentIndex = exercises.length ? 0 : -1;
          updateUI();
          return;
        }

        const res = await fetch("http://localhost:4000/api/live-session", {
          headers: { Authorization: `Bearer ${token}` }
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.error || "Failed to load live session");
          return;
        }

        exercises = (data.exercises || []).map((ex) => ({ ...ex, done: false }));
        currentIndex = exercises.length ? 0 : -1;
        updateUI();
      } catch (err) {
        alert("Server error while loading live session");
      }
    }

    function markDone() {
      if (currentIndex < 0) return;
      exercises[currentIndex].done = true;
      currentIndex = currentIndex + 1 < exercises.length ? currentIndex + 1 : -1;
      updateUI();
    }

    function restartSession() {
      exercises.forEach((ex) => {
        ex.done = false;
      });
      currentIndex = exercises.length ? 0 : -1;
      updateUI();
    }

    startBtn.addEventListener("click", loadLiveData);
    restartBtn.addEventListener("click", restartSession);
    markDoneBtn.addEventListener("click", markDone);
  </script>
</body>
</html>
