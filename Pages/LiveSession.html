<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" href="../Photos/GymRats.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Session - GymRats LK</title>
    <link rel="stylesheet" href="styles.css" />

    <style>
        .dashboard-layout {
            display: block;
            background: var(--bg-color);
            min-height: 100vh;
        }

        .main-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .page-header h2 {
            margin: 0;
            text-align: left;
        }

        .page-header p {
            margin: 6px 0 0;
            text-align: left;
        }

        .session-grid {
            display: grid;
            grid-template-columns: 1fr 1.4fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .session-card {
            background: #fff;
            border-radius: 18px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid #e9eef5;
        }

        .section-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .timer {
            font-size: 56px;
            font-weight: 800;
            color: var(--primary-color);
            margin: 10px 0 20px;
        }

        .button-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .button-row button {
            width: auto;
            min-width: 120px;
            margin-top: 0;
        }

        .now-title {
            font-size: 34px;
            font-weight: 800;
            margin: 5px 0 10px;
        }

        .now-meta {
            color: var(--text-secondary);
            font-size: 18px;
            margin-bottom: 14px;
        }

        .progress-text {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .progress-bar-wrap {
            width: 100%;
            height: 14px;
            background: #edf2f7;
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 18px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--primary-color);
            border-radius: 999px;
            transition: width 0.25s ease;
        }

        .day-select {
            min-width: 220px;
            margin: 0;
        }

        .checklist-card {
            background: #fff;
            border-radius: 18px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid #e9eef5;
        }

        .exercise-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            padding: 18px;
            border: 1px solid #eef2f7;
            border-radius: 14px;
            margin-bottom: 14px;
            transition: all 0.2s ease;
        }

        .exercise-item.active {
            border-color: var(--primary-color);
            background: rgba(160, 196, 255, 0.12);
        }

        .exercise-item.completed {
            opacity: 0.65;
            background: #f8fafc;
        }

        .exercise-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .check-circle {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--primary-color);
            flex-shrink: 0;
            position: relative;
        }

        .exercise-item.completed .check-circle {
            background: var(--primary-color);
        }

        .exercise-item.completed .check-circle::after {
            content: "✓";
            position: absolute;
            left: 4px;
            top: -1px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
        }

        .exercise-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .exercise-meta {
            color: var(--text-secondary);
            font-size: 15px;
        }

        .status-pill {
            background: var(--secondary-bg);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            min-width: 72px;
            text-align: center;
        }

        .status-pill.active {
            background: var(--primary-color);
            color: #fff;
        }

        .status-pill.done {
            background: #d9f5df;
            color: #2e7d32;
        }

        @media (max-width: 900px) {
            .session-grid {
                grid-template-columns: 1fr;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .exercise-item {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body class="dashboard-layout">

<header class="site-header">
    <div class="header-left">
        <a href="Schedule.html" class="brand-wrap">
            <img src="../Photos/GymRats.png" alt="GymRats LK Logo" class="brand-logo" />
            <div class="brand-text">
                <div class="brand-title">GymRats<span>LK</span></div>
                <div class="brand-subtitle">Live training mode</div>
            </div>
        </a>

        <nav class="nav-links">
            <a href="Schedule.html" class="nav-link">📅 Schedule</a>
            <a href="LiveSession.html" class="nav-link active">🔴 Live Sessions</a>
        </nav>
    </div>

    <div class="header-right">
        <div class="user-avatar" id="userAvatar">?</div>
        <span id="userName" style="display:none;"></span>
        <button class="btn btn-logout" id="logoutBtn">Sign Out</button>
    </div>
</header>

<main class="main-content">

    <div class="page-header">
        <div>
            <h2>Live Session</h2>
            <p>Track your workout in real time</p>
        </div>

        <div class="button-row">
            <select id="day-picker" class="day-select">
                <option>Loading...</option>
            </select>
            <button class="btn-outline" id="reload">⟳ Reload</button>
        </div>
    </div>

    <div class="session-grid">
        <section class="session-card">
            <div class="section-label">Stopwatch</div>
            <div class="timer" id="session-clock">00:00</div>

            <div class="button-row">
                <button id="start">▶ Start</button>
                <button class="btn-outline" id="pause">⏸ Pause</button>
                <button class="btn-outline" id="reset">↺ Reset</button>
            </div>
        </section>

        <section class="session-card">
            <div class="section-label">Now Tracking</div>
            <div class="now-title" id="current-ex-name">–</div>
            <div class="now-meta" id="current-ex-meta">Sets: –, Reps: –</div>

            <div class="progress-text">
                Progress: <span id="set-count">0</span> / <span id="total-sets">0</span> Sets
            </div>

            <div class="progress-bar-wrap">
                <div class="progress-bar-fill" id="set-progress-fill"></div>
            </div>

            <div class="button-row">
                <button id="next-set" style="flex:1;">Log Set (Done)</button>
                <button class="btn-outline" id="next-ex">Skip</button>
            </div>
        </section>
    </div>

    <section class="checklist-card">
        <div class="card-title">Workout Checklist</div>
        <div id="exercise-list"></div>
    </section>

</main>

<script>
    const token = localStorage.getItem("gr_token");
    const userRaw = localStorage.getItem("gr_user");

    if (!token) {
        window.location.href = "Login.html";
    }

    let currentUser = {};
    try {
        currentUser = JSON.parse(userRaw) || {};
    } catch {
        currentUser = {};
    }

    if (currentUser.name) {
        document.getElementById("userName").textContent = currentUser.name;
        document.getElementById("userName").style.display = "inline-block";
        document.getElementById("userAvatar").textContent =
            currentUser.name.charAt(0).toUpperCase();
    }

    document.getElementById("logoutBtn").onclick = () => {
        localStorage.clear();
        window.location.href = "Login.html";
    };

    const API_BASE = "http://localhost:4000";
    const API = { get: `${API_BASE}/api/live-session` };

    let schedule = [];
    let currentDayIndex = 0;
    let currentExIndex = 0;
    let currentSet = 0;
    let sessionInterval = null;
    let elapsedSec = 0;
    let completedEx = [];

    const dayPicker = document.getElementById("day-picker");
    const exerciseList = document.getElementById("exercise-list");
    const currentExName = document.getElementById("current-ex-name");
    const currentExMeta = document.getElementById("current-ex-meta");
    const clock = document.getElementById("session-clock");
    const setCountText = document.getElementById("set-count");
    const totalSetsText = document.getElementById("total-sets");
    const progressFill = document.getElementById("set-progress-fill");

    document.getElementById("start").onclick = startTimer;
    document.getElementById("pause").onclick = pauseTimer;
    document.getElementById("reset").onclick = resetTimer;
    document.getElementById("reload").onclick = loadSchedule;
    document.getElementById("next-set").onclick = logSet;
    document.getElementById("next-ex").onclick = skipExercise;

    dayPicker.onchange = () => {
        currentDayIndex = dayPicker.selectedIndex;
        resetSessionState();
        renderExercises();
    };

    function startTimer() {
        if (sessionInterval) return;

        sessionInterval = setInterval(() => {
            elapsedSec++;
            clock.textContent = formatTime(elapsedSec);
        }, 1000);
    }

    function pauseTimer() {
        clearInterval(sessionInterval);
        sessionInterval = null;
    }

    function resetTimer() {
        pauseTimer();
        elapsedSec = 0;
        clock.textContent = "00:00";
        resetSessionState();
        renderExercises();
    }

    function resetSessionState() {
        currentExIndex = 0;
        currentSet = 0;
        completedEx = [];
    }

    function formatTime(sec) {
        const m = Math.floor(sec / 60).toString().padStart(2, "0");
        const s = (sec % 60).toString().padStart(2, "0");
        return `${m}:${s}`;
    }

    async function loadSchedule() {
        try {
            const res = await fetch(API.get, {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            });

            if (!res.ok) throw new Error("Failed to load");

            const data = await res.json();
            schedule = data.days || [];

            dayPicker.innerHTML = "";

            if (schedule.length === 0) {
                dayPicker.innerHTML = "<option>No Schedules Found</option>";
                exerciseList.innerHTML = "<p>No workout plan available.</p>";
                currentExName.textContent = "No workout found";
                currentExMeta.textContent = "Create a schedule first.";
                setCountText.textContent = "0";
                totalSetsText.textContent = "0";
                progressFill.style.width = "0%";
                return;
            }

            schedule.forEach((d, i) => {
                const opt = document.createElement("option");
                opt.textContent = d.day_name || `Day ${i + 1}`;
                dayPicker.appendChild(opt);
            });

            currentDayIndex = 0;
            resetSessionState();
            renderExercises();
        } catch (err) {
            console.error(err);
            alert("Error: Make sure you are logged in and the server is running!");
        }
    }

    function renderExercises() {
        const day = schedule[currentDayIndex] || { exercises: [] };
        exerciseList.innerHTML = "";

        day.exercises.forEach((ex, idx) => {
            const isCompleted = completedEx.includes(idx);
            const isActive = idx === currentExIndex && !isCompleted;

            const row = document.createElement("div");
            row.className = `exercise-item ${isActive ? "active" : ""} ${isCompleted ? "completed" : ""}`;

            row.innerHTML = `
                <div class="exercise-left">
                    <span class="check-circle"></span>
                    <div>
                        <div class="exercise-name">${ex.name}</div>
                        <div class="exercise-meta">${ex.sets} Sets · ${ex.reps} Reps · ${ex.type}</div>
                    </div>
                </div>
                <div class="status-pill ${isCompleted ? "done" : (isActive ? "active" : "")}">
                    ${isCompleted ? "Done" : (isActive ? "Active" : "Wait")}
                </div>
            `;

            exerciseList.appendChild(row);
        });

        const ex = day.exercises[currentExIndex];

        if (ex && !completedEx.includes(currentExIndex)) {
            currentExName.textContent = ex.name;
            currentExMeta.textContent = `Target: ${ex.sets} Sets of ${ex.reps}`;

            const totalSets = parseInt(ex.sets) || 1;
            totalSetsText.textContent = totalSets;
            setCountText.textContent = currentSet;

            const percent = Math.min((currentSet / totalSets) * 100, 100);
            progressFill.style.width = `${percent}%`;

            document.getElementById("next-set").disabled = false;
        } else {
            currentExName.textContent =
                completedEx.length === day.exercises.length && day.exercises.length > 0
                    ? "Workout Finished! 🎉"
                    : "Ready?";
            currentExMeta.textContent = "Select a day or start the timer.";
            setCountText.textContent = "0";
            totalSetsText.textContent = "0";
            progressFill.style.width = "0%";
            document.getElementById("next-set").disabled = true;
        }
    }

    function logSet() {
        const day = schedule[currentDayIndex];
        if (!day || !day.exercises[currentExIndex]) return;

        const ex = day.exercises[currentExIndex];
        const totalSets = parseInt(ex.sets) || 1;

        currentSet++;

        if (currentSet >= totalSets) {
            completedEx.push(currentExIndex);
            moveToNextExercise();
        }

        renderExercises();
    }

    function skipExercise() {
        moveToNextExercise();
        renderExercises();
    }

    function moveToNextExercise() {
        const day = schedule[currentDayIndex];
        if (!day) return;

        if (currentExIndex < day.exercises.length - 1) {
            currentExIndex++;
            currentSet = 0;
        } else {
            pauseTimer();
            alert("Workout Session Complete! Great job! 🎉");
        }
    }

    loadSchedule();
</script>

</body>
</html>
